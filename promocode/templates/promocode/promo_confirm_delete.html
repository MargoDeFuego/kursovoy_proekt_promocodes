{% extends "base.html" %}

{% block content %}

<!-- Заголовок страницы -->
<h1 class="page-title">Удалить промокод</h1>

<!-- Карточка подтверждения удаления -->
<div class="confirm-card">
  <p class="confirm-text">
    Вы действительно хотите удалить<br>
    <strong>{{ promo.title }}</strong>?
  </p>

  <!-- Форма подтверждения -->
  <form method="post" class="confirm-actions">
    {% csrf_token %}

    <!-- Кнопка удаления -->
    <button type="submit" class="delete-btn">Удалить</button>
    <!-- Ссылка отмены -->
    <a href="{% url 'promo_detail' promo.pk %}" class="cancel-link">Отмена</a>
  </form>
</div>

<style>
  .page-title {
    font-size: 26px;
    margin-bottom: 20px;
  }

  .confirm-card {
    background: #fff;
    border-radius: 10px;
    padding: 25px 30px;
    border: 1px solid #ddd;
    box-shadow: 0 2px 6px rgba(0,0,0,0.05);
    max-width: 500px;
  }

  .confirm-text {
    font-size: 18px;
    margin-bottom: 25px;
    color: #444;
    line-height: 1.5;
  }

  .confirm-actions {
    display: flex;
    gap: 15px;
    align-items: center;
  }

  .delete-btn {
    background: #e53935;
    color: white;
    border: none;
    padding: 8px 18px;
    border-radius: 6px;
    cursor: pointer;
    font-weight: bold;
  }

  .delete-btn:hover {
    background: #c62828;
  }

  .cancel-link {
    color: #0077cc;
    text-decoration: none;
    font-weight: bold;
  }

  .cancel-link:hover {
    text-decoration: underline;
  }
</style>

{% endblock %}
