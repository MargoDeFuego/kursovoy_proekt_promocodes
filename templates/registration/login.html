{% extends "base.html" %}

{% block content %}
<h1 class="page-title">Вход</h1>

<div class="form-card">
  <form method="post">
    {% csrf_token %}
    {{ form.as_p }}

    <div class="form-actions">
      <button type="submit" class="submit-btn">Войти</button>
    </div>
  </form>
</div>

<style>
  .page-title {
    font-size: 26px;
    margin-bottom: 20px;
  }
  .form-card {
    background: #fff;
    border-radius: 10px;
    padding: 20px 25px;
    border: 1px solid #ddd;
    box-shadow: 0 2px 6px rgba(0,0,0,0.05);
    max-width: 400px;
  }
  .form-actions {
    margin-top: 20px;
  }
  .submit-btn {
    background: #4CAF50;
    color: white;
    border: none;
    padding: 8px 16px;
    border-radius: 6px;
    cursor: pointer;
    font-weight: bold;
  }
</style>
{% endblock %}
